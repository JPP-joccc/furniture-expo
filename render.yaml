services:
  - type: web
    name: furniture-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: ALLOW_LAN_ACCESS
        value: "false"
      - key: ENABLE_API_DOCS
        value: "false"
      - key: ALLOW_DEMO_SEED
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: MERCHANT_INVITE_CODE
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
